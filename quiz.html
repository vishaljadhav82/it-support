<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Group Study Live Meeting Quiz</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI',sans-serif;
    background:#f4f7f6;
    padding:15px;
}

.main-layout{
    display:flex;
    flex-direction:column;
    gap:20px;
    max-width:1400px;
    margin:auto;
}

/* JITSI AREA */

.video-section{
    background:#fff;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
    padding:10px;
}

#jitsi-container{
    width:100%;
    height:500px;
    border-radius:12px;
    overflow:hidden;
}

/* QUIZ CARD */

.quiz-card{
    background:white;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
    width:100%;
    padding:25px;
    text-align:center;
}

.question-text{
    font-size:1.4rem;
    font-weight:600;
    margin-bottom:20px;
    color:#333;
    min-height:60px;
}

.options-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
    margin-bottom:20px;
}

.opt-btn{
    padding:15px;
    border:2px solid #ddd;
    border-radius:10px;
    background:white;
    cursor:pointer;
    font-size:1rem;
    transition:0.2s;
}

.opt-btn:hover{
    background:#f5f5f5;
}

.timer-display{
    font-size:2.5rem;
    font-weight:bold;
    color:#ff5722;
    margin-bottom:10px;
    visibility:hidden;
}

/* TABLE */

.table-wrapper{
    width:100%;
    overflow-x:auto;
    margin-top:30px;
    border:1px solid #ddd;
    border-radius:8px;
}

table{
    width:100%;
    min-width:700px;
    border-collapse:collapse;
    background:#fff;
    table-layout:auto;
}

th,td{
    border:1px solid #ddd;
    padding:15px;
    text-align:center;
    white-space:nowrap;
}

th{
    background-color:#333;
    color:white;
}

/* STATUS */

.p1-selected{
    border:3px solid #2196f3 !important;
    background:#e3f2fd;
}

.p2-selected{
    border:3px solid #ff9800 !important;
    background:#fff3e0;
}

.both-selected{
    border:4px solid #9c27b0 !important;
}

.winner-row{
    background-color:#fff9c4 !important;
    font-weight:bold;
}

.status-badge{
    font-weight:bold;
}

.right{
    color:#2e7d32;
}

.wrong{
    color:#c62828;
}

#restart-btn{
    display:none;
    margin:20px auto;
    padding:12px 30px;
    background:#4caf50;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:1.1rem;
}

#msg{
    margin-top:10px;
    font-weight:bold;
    color:#666;
}

.top-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:15px;
    gap:10px;
    flex-wrap:wrap;
}

.study-title{
    font-size:1.5rem;
    font-weight:bold;
}

.room-box{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

input{
    padding:10px;
    border-radius:8px;
    border:1px solid #ccc;
}

button{
    cursor:pointer;
}

.control-btn{
    background:#2196f3;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:8px;
}

@media(max-width:700px){

    .options-grid{
        grid-template-columns:1fr;
    }

    #jitsi-container{
        height:350px;
    }
}
</style>
</head>

<body>

<div class="main-layout">

    <!-- TOP -->
    <div class="video-section">

        <div class="top-header">

            <div class="study-title">
                📚 Live Group Study Room
            </div>

            <div class="room-box">

                <input type="text" id="username" placeholder="Enter Name">

                <input type="text" id="roomname" placeholder="Enter Room ID">

                <button class="control-btn" onclick="startMeeting()">
                    Join Study Room
                </button>

            </div>

        </div>

        <div id="jitsi-container"></div>

    </div>

    <!-- QUIZ -->
    <div class="quiz-card">

        <div id="quiz-section">

            <div id="timer" class="timer-display">30</div>

            <div class="question-text" id="q-text">
                Loading...
            </div>

            <div class="options-grid" id="opt-box"></div>

            <div id="msg">
                Tumcha option select kara!
            </div>

        </div>

        <div id="final-header" style="display:none;">
            <h2 style="color:#2e7d32;">
                🏁 Final Evaluation Result
            </h2>
        </div>

        <!-- SCOREBOARD -->

        <div class="table-wrapper">

            <table>

                <thead>

                    <tr>
                        <th>Rank</th>
                        <th>User Name</th>
                        <th>Selected Answer</th>
                        <th>Last Status</th>
                        <th>Total Marks</th>
                    </tr>

                </thead>

                <tbody id="table-body">

                    <tr id="row-userA">
                        <td class="rank-cell">1</td>
                        <td><b>User A (You)</b></td>
                        <td class="choice-cell">-</td>
                        <td class="status-cell">-</td>
                        <td class="score-cell">0</td>
                    </tr>

                    <tr id="row-userB">
                        <td class="rank-cell">2</td>
                        <td><b>User B (Bot)</b></td>
                        <td class="choice-cell">-</td>
                        <td class="status-cell">-</td>
                        <td class="score-cell">0</td>
                    </tr>

                </tbody>

            </table>

        </div>

        <button id="restart-btn" onclick="location.reload()">
            Restart Quiz
        </button>

    </div>

</div>

<!-- JITSI -->
<script src="https://meet.jit.si/external_api.js"></script>

<script>

let api = null;

function startMeeting(){

    const userName = document.getElementById("username").value || "Student";

    const roomName = document.getElementById("roomname").value || "StudyRoom2026";

    if(api){
        api.dispose();
    }

    const domain = "meet.jit.si";

    const options = {

        roomName: roomName,

        width: "100%",

        height: 500,

        parentNode: document.querySelector('#jitsi-container'),

        userInfo: {
            displayName: userName
        },

        configOverwrite: {

            startWithAudioMuted: false,

            startWithVideoMuted: false,

            prejoinPageEnabled: false

        },

        interfaceConfigOverwrite: {

            SHOW_JITSI_WATERMARK: false,

            SHOW_BRAND_WATERMARK: false

        }
    };

    api = new JitsiMeetExternalAPI(domain, options);
}

/* QUIZ */

const questions = [

{
q:"Bharatatil sarvat mothi Nadi konti?",
a:"Ganga",
opts:["Ganga","Yamuna","Godavari","Sindhu"]
},

{
q:"Swarajya mhanje kay?",
a:"Swatache Rajya",
opts:["Parakiya Rajya","Swatache Rajya","Ingraj Rajya","Mughal Rajya"]
},

{
q:"1 TB mhanje kiti GB?",
a:"1024 GB",
opts:["500 GB","1000 GB","1024 GB","2048 GB"]
},

{
q:"CPU che full form kay?",
a:"Central Processing Unit",
opts:[
"Central Processing Unit",
"Computer Personal Unit",
"Central Program Utility",
"Computer Process Unit"
]
}

];

let currentQ = 0;

let scoreA = 0;

let scoreB = 0;

let p1Choice = null;

let p2Choice = null;

function loadQuestion(){

    if(currentQ >= questions.length){

        document.getElementById("quiz-section").style.display="none";

        document.getElementById("final-header").style.display="block";

        document.getElementById("restart-btn").style.display="block";

        return;
    }

    const data = questions[currentQ];

    document.getElementById("q-text").innerText =
    (currentQ + 1) + ". " + data.q;

    const box = document.getElementById("opt-box");

    box.innerHTML = "";

    p1Choice = null;

    p2Choice = null;

    document.getElementById("timer").style.visibility="hidden";

    document.getElementById("msg").innerText =
    "Tumcha option select kara!";

    data.opts.forEach(o=>{

        const btn = document.createElement("button");

        btn.className = "opt-btn";

        btn.innerText = o;

        btn.onclick = ()=>{

            if(p1Choice) return;

            p1Choice = o;

            btn.classList.add("p1-selected");

            document.getElementById("row-userA")
            .querySelector(".choice-cell")
            .innerText = p1Choice;

            setTimeout(botLogic,800);
        };

        box.appendChild(btn);
    });
}

function botLogic(){

    const data = questions[currentQ];

    p2Choice =
    data.opts[Math.floor(Math.random()*4)];

    document.getElementById("row-userB")
    .querySelector(".choice-cell")
    .innerText = p2Choice;

    document.querySelectorAll(".opt-btn").forEach(btn=>{

        if(btn.innerText===p2Choice){

            if(btn.classList.contains("p1-selected")){

                btn.classList.replace(
                    "p1-selected",
                    "both-selected"
                );

            }else{

                btn.classList.add("p2-selected");
            }
        }
    });

    startTimer();
}

function startTimer(){

    let timeLeft = 30;

    const timerEl = document.getElementById("timer");

    timerEl.style.visibility = "visible";

    timerEl.innerText = timeLeft;

    const interval = setInterval(()=>{

        timeLeft--;

        timerEl.innerText = timeLeft;

        if(timeLeft <= 0){

            clearInterval(interval);

            evaluate();
        }

    },1000);
}

function evaluate(){

    const correct = questions[currentQ].a;

    if(p1Choice===correct) scoreA++;

    if(p2Choice===correct) scoreB++;

    const rA = document.getElementById("row-userA");

    rA.querySelector(".status-cell").innerHTML =
    (p1Choice===correct)
    ? "<span class='status-badge right'>✅ Right</span>"
    : "<span class='status-badge wrong'>❌ Wrong</span>";

    rA.querySelector(".score-cell").innerText = scoreA;

    const rB = document.getElementById("row-userB");

    rB.querySelector(".status-cell").innerHTML =
    (p2Choice===correct)
    ? "<span class='status-badge right'>✅ Right</span>"
    : "<span class='status-badge wrong'>❌ Wrong</span>";

    rB.querySelector(".score-cell").innerText = scoreB;

    rA.classList.remove("winner-row");

    rB.classList.remove("winner-row");

    if(scoreA > scoreB){

        rA.querySelector(".rank-cell").innerText = "1";

        rB.querySelector(".rank-cell").innerText = "2";

        rA.classList.add("winner-row");

    }else if(scoreB > scoreA){

        rA.querySelector(".rank-cell").innerText = "2";

        rB.querySelector(".rank-cell").innerText = "1";

        rB.classList.add("winner-row");

    }else{

        rA.querySelector(".rank-cell").innerText = "1";

        rB.querySelector(".rank-cell").innerText = "1";
    }

    document.getElementById("msg").innerText =
    "Correct Answer: " + correct;

    setTimeout(()=>{

        currentQ++;

        loadQuestion();

    },3000);
}

loadQuestion();

</script>

</body>
</html>
