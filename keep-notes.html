<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>माझ्या नोट्स - प्रेझेंटेशन मोड</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <style>
        body { background-color: #f8f9fa; }
        .notes-grid { column-count: 3; column-gap: 15px; }
        @media (max-width: 992px) { .notes-grid { column-count: 2; } }
        @media (max-width: 576px) { .notes-grid { column-count: 1; } }
        
        .note-card { break-inside: avoid; margin-bottom: 15px; cursor: pointer; background: white; border-radius: 12px; transition: 0.3s; }
        .note-card:hover { transform: scale(1.02); box-shadow: 0 10px 20px rgba(0,0,0,0.15); }
        .input-box { max-width: 800px; margin: 30px auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        img { max-width: 100%; border-radius: 8px; display: block; }
        
        /* Modal for Presentation */
        .modal-body img { width: 100%; height: auto; }
    </style>
</head>
<body>

<div class="container-fluid mt-4">
    <h2 class="text-center mb-4">📸 माझ्या नोट्स गॅलरी (Presentation Mode)</h2>
    
    <div class="input-box">
        <input type="text" id="noteTitle" class="form-control mb-2" placeholder="शीर्षक (Title)">
        <textarea id="noteInput" class="form-control mb-2" rows="3" placeholder="Ctrl+V ने इमेज पेस्ट करा..." onpaste="handlePaste(event)"></textarea>
        <button class="btn btn-success w-100" onclick="saveNote()">सेव्ह करा</button>
    </div>

    <div id="notesContainer" class="notes-grid"></div>
</div>

<!-- Modal for Slideshow -->
<div class="modal fade" id="noteModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-fullscreen">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle"></h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body text-center" id="modalBody"></div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCSwr1mbjcFhjeWCoZIipb5TE3o0jLkU7M",
        authDomain: "quiz-43b3e.firebaseapp.com",
        projectId: "quiz-43b3e",
        storageBucket: "quiz-43b3e.appspot.com",
        messagingSenderId: "477037762591",
        appId: "1:477037762591:web:03478c214a0477ff819d2a"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.handlePaste = (event) => {
        const items = event.clipboardData.items;
        for (let i = 0; i < items.length; i++) {
            if (items[i].type.indexOf("image") !== -1) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById("noteInput").value += `\n<img src="${e.target.result}">\n`;
                };
                reader.readAsDataURL(items[i].getAsFile());
            }
        }
    };

    window.openModal = (title, content) => {
        document.getElementById('modalTitle').innerText = title;
        document.getElementById('modalBody').innerHTML = content;
        new bootstrap.Modal(document.getElementById('noteModal')).show();
    };

    window.saveNote = async () => {
        const title = document.getElementById("noteTitle").value;
        const text = document.getElementById("noteInput").value;
        await addDoc(collection(db, "notes"), { title: title || "विनशर्षक", text, createdAt: new Date() });
        location.reload();
    };

    const loadNotes = async () => {
        const q = query(collection(db, "notes"), orderBy("createdAt", "desc"));
        const snapshot = await getDocs(q);
        const container = document.getElementById("notesContainer");
        
        snapshot.forEach((doc) => {
            const data = doc.data();
            const div = document.createElement("div");
            div.className = "card note-card p-3";
            div.onclick = () => openModal(data.title, data.text);
            div.innerHTML = `<h5 class="text-primary">${data.title}</h5><div style="font-size: 0.8rem;">${data.text}</div>`;
            container.appendChild(div);
        });
    };

    loadNotes();
</script>

</body>
</html>
